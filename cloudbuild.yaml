steps:
  # Step 1: Install root dependencies and run tests
  - name: 'node:20'
    id: 'install-and-test'
    entrypoint: npm
    args: ['install']


  # Step 2: Install Cloud Function dependencies
  - name: 'node:20'
    id: 'install-functions'
    entrypoint: npm
    args: ['install', '--prefix', 'functions']
    waitFor: ['install-and-test']

  # Step 3: Deploy Cloud Function (electionIQAssist)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-function'
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - electionIQAssist
      - '--runtime=nodejs20'
      - '--trigger-http'
      - '--allow-unauthenticated'
      - '--region=us-central1'
      - '--source=functions/'
      - '--entry-point=electionIQAssist'
      - '--project=$PROJECT_ID'
      - '--set-env-vars=GCP_PROJECT=$PROJECT_ID'
    waitFor: ['install-functions']

  # Step 4: Inject API keys and deploy Cloud Run frontend
  - name: 'bash'
    id: 'inject-keys'
    args:
      - '-c'
      - |
        sed -i "s/__GEMINI_API_KEY__/$_GEMINI_API_KEY/g"   config.js
        sed -i "s/__FIREBASE_API_KEY__/$_FIREBASE_API_KEY/g" config.js
        sed -i "s/__FIREBASE_AUTH_DOMAIN__/$_FIREBASE_AUTH_DOMAIN/g" config.js
        sed -i "s/__FIREBASE_PROJECT_ID__/$_FIREBASE_PROJECT_ID/g" config.js
        sed -i "s/__FIREBASE_STORAGE__/$_FIREBASE_STORAGE/g" config.js
        sed -i "s/__FIREBASE_SENDER_ID__/$_FIREBASE_SENDER_ID/g" config.js
        sed -i "s/__FIREBASE_APP_ID__/$_FIREBASE_APP_ID/g" config.js
        sed -i "s/__FIREBASE_MEASUREMENT__/$_FIREBASE_MEASUREMENT/g" config.js
        sed -i "s/__FIREBASE_DB_URL__/$_FIREBASE_DB_URL/g" config.js
        sed -i "s/__MAPS_API_KEY__/$_MAPS_API_KEY/g"       config.js
        sed -i "s/__ROUTES_API_KEY__/$_ROUTES_API_KEY/g"     config.js
        sed -i "s|__CF_URL__|https://us-central1-$PROJECT_ID.cloudfunctions.net/electionIQAssist|g" js/ai.js
    waitFor: ['install-and-test']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - electioniq-app
      - '--source=.'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--quiet'
      - '--project=$PROJECT_ID'
    waitFor: ['inject-keys', 'deploy-cloud-function']

substitutions:
  _GEMINI_API_KEY: ""
  _FIREBASE_API_KEY: ""
  _FIREBASE_AUTH_DOMAIN: ""
  _FIREBASE_PROJECT_ID: ""
  _FIREBASE_STORAGE: ""
  _FIREBASE_SENDER_ID: ""
  _FIREBASE_APP_ID: ""
  _FIREBASE_MEASUREMENT: ""
  _FIREBASE_DB_URL: ""
  _MAPS_API_KEY: ""
  _ROUTES_API_KEY: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: '1200s'
